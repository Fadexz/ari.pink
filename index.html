<!DOCTYPE html>
<html>
<head>
    <title>ari.pink</title>
    <style>
        html {
            display: table;
            margin: auto;
            height: 100%;
            font-family: monospace;
        }
        .bg-video {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .bg-blur {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            backdrop-filter: blur(12px);
            background-color: rgba(190, 184, 191, 0.75);
            z-index: -1;
        }
        .main-text {
            font-size: 64px;
            color: #ff4fa3;
            text-shadow: 0 0 28px rgba(229, 94, 162, 0.8);
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }
        body {
            display: table-cell;
            vertical-align: middle;
            height: 100%;
        }
        button, input {
            background-color: rgba(255,255,255,.7);
            border: none;
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="bg-video">
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="bg-blur"></div>
    <h1 class="main-text">Ari's Lips</h1>
</body>
</html>
