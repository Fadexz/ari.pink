<!DOCTYPE html>
<html>
<head>
    <title>ari.pink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        :root {
            --blur: 10px;
        }
        @media (min-resolution: 2dppx) {
            :root {
                --blur: 7px;
            }
        }
        @media (min-resolution: 3dppx) {
            :root {
                --blur: 5px;
            }
        }
        html, body {
            height: 100%;
            margin: 0;
            font-family: monospace;
            overflow: hidden;
            touch-action: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .bg-video {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .bg-blur {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            overflow: hidden;
            z-index: -1;
        }
        .bg-blur::before {
            content: "";
            position: absolute;
            top: -15%;
            left: -15%;
            width: 130%;
            height: 130%;
            backdrop-filter: blur(var(--blur));
            background-color: rgba(190, 184, 191, 0.7);
        }
        .main-text {
            font-size: clamp(36px, 10vw, 64px);
            color: #ff4fa3;
            text-shadow: 0 0 28px rgba(229, 94, 162, 0.8);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            text-align: center;
        }
        @media (orientation: landscape) and (max-width: 900px) {
            .main-text {
                font-size: clamp(24px, 6vw, 48px);
            }
        }
        button, input {
            background-color: rgba(255, 255, 255, .7);
            border: none;
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="bg-video">
        <source src="https://i.imgur.com/yIzD29j.mp4" type="video/mp4">
    </video>
    <div class="bg-blur"></div>
    <h1 class="main-text">Ari's Lips</h1>
</body>
</html>
